<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KomikSite - Giriş Yap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header ve Navigasyon -->
<header>
    <div class="logo">
        <h1>😂 KomikSite</h1>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Anasayfa</a></li>
            <li><a href="resimler.html">Komik Resimler</a></li>
            <li><a href="videolar.html">Komik Videolar</a></li>
            <li><a href="kayit.html">Kayıt Ol</a></li>
            <li><a href="giris.html">Giriş Yap</a></li>
        </ul>
    </nav>
</header>

<!-- Ana içerik -->
<main>
    <section>
        <h2>Giriş Yap</h2>
        <form id="girisForm" onsubmit="return validateLogin()">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="sifre">Şifre:</label>
            <input type="password" id="sifre" name="sifre" required>

            <button type="submit">Giriş Yap</button>
        </form>
    </section>
</main>

<!-- Footer -->
<footer>
    <p>&copy; 2026 KomikSite. Tüm hakları saklıdır.</p>
</footer>

<script>
function validateLogin() {
    const email = document.getElementById('email').value.trim();
    const sifre = document.getElementById('sifre').value;
    if(email === "" || sifre === ""){
        alert("Email ve şifre boş olamaz!");
        return false;
    }
    alert("Giriş başarılı!");
    return true;
}
</script>

</body>
</html>
